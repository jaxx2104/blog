name: Test
on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging
      - develop
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ./.node-version
          cache: "pnpm"
      - run: pnpm install
      # Build velite + vite (TanStack Start prerender) BEFORE tsc.
      # vite build generates app/routeTree.gen.ts which app/router.tsx
      # imports; without this step tsc fails with TS2307. velite output is
      # also required by scripts/verify-velite.ts type-checking.
      - name: Build content layer + tanstack start prerender
        run: pnpm build:vite
      - run: pnpm test
      # NOTE: temporary cross-check during stack modernization Phase 0.
      # Remove together with lib/posts.ts legacy reader in Phase 4.
      - name: Verify velite output matches legacy
        run: pnpm verify:velite
      # Phase 2 smoke: prerender must emit home + profile + every velite
      # post (>= 111). Spot-check OGP meta on a known post — both an
      # original-slug post (php-replace-lf) and a renamed-slug post
      # (readme-siri, formerly 2017-08-04-listening-book).
      - name: Verify dist artifacts (phase 2 routes + OGP)
        run: |
          test -f dist/client/index.html
          test -f dist/client/profile/index.html
          test -f dist/client/php-replace-lf/index.html
          test -f dist/client/readme-siri/index.html
          count=$(find dist/client -name index.html | wc -l)
          test "$count" -ge 111 || { echo "expected >=111 index.html, got $count" && exit 1; }
          grep -a -F -q 'og:image' dist/client/php-replace-lf/index.html
          grep -a -F -q 'og:type' dist/client/php-replace-lf/index.html
          grep -a -F -q 'rel="canonical"' dist/client/php-replace-lf/index.html
