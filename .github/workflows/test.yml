name: Test
on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging
      - develop
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: ./.node-version
          cache: "pnpm"
      - run: pnpm install
      # Build velite + vite (TanStack Start prerender) BEFORE tsc.
      # vite build generates app/routeTree.gen.ts which app/router.tsx
      # imports; without this step tsc fails with TS2307. velite output is
      # also required by scripts/verify-velite.ts type-checking.
      - name: Build content layer + tanstack start prerender
        run: pnpm build:vite
      - run: pnpm test
      # NOTE: temporary cross-check during stack modernization Phase 0.
      # Remove together with lib/posts.ts legacy reader in Phase 4.
      - name: Verify velite output matches legacy
        run: pnpm verify:velite
      # NOTE: 'Phase 1 stub' check is temporary. Remove together with the
      # placeholder copy in app/routes/index.tsx when Phase 2 lands.
      # Use grep -F because the prerendered HTML contains a UTF-8 em-dash
      # that breaks default grep regex parsing.
      - name: Verify dist artifacts (phase 1 stub)
        run: |
          test -f dist/client/index.html
          grep -F -q 'Phase 1 stub' dist/client/index.html
